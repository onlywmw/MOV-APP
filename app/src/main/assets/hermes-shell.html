<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOV</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/shell.css">
</head>
<body>
<div class="phone" id="phone">
  <div class="stage">

    <!-- 会话 tab · 房间列表 -->
    <div class="view act" id="view-rooms">
      <div class="bighead">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="min-width:0;flex:1"><h3 data-i18n="rooms.title">房间</h3><div class="bh-sub" id="roomsSub">—</div></div>
        </div>
      </div>
      <div class="sbody">
        <div class="room-list" id="roomList"></div>
      </div>
      <button class="fab" id="fabNew" title="新建房间" aria-label="新建房间">+</button>
    </div>

    <!-- 会话 tab · 房间详情 -->
    <div class="view" id="view-room">
      <div class="abar">
        <span class="back" id="btnBack" data-i18n="room.back">←</span>
        <div style="min-width:0;flex:1"><h4 id="roomTitle">—</h4><div class="sub" id="roomSub">—</div></div>
        <span id="roomPhaseBadge"></span>
        <span class="ico-btn" id="btnRoomMore" title="更多" data-i18n="room.more">⋮</span>
      </div>
      <!-- 房间内子 tab -->
      <div class="room-tabs" id="roomTabs">
        <span class="room-tab on" data-subtab="chat" data-i18n="room.tabChat">讨论</span>
        <span class="room-tab" data-subtab="files" data-i18n="room.tabFiles">文件</span>
      </div>
      <div class="sbody" id="chatPane"><div class="chat-body" id="chatBody"></div></div>
      <!-- 文件视图 (存储系统 v3.0: 产出/资料/归档/模板) -->
      <div class="file-view" id="fileView" style="display:none">
        <div class="storage-tabs" id="storageTabs">
          <span class="storage-tab on" data-stype="work" data-i18n="st.work">产出</span>
          <span class="storage-tab" data-stype="inbox" data-i18n="st.inbox">资料</span>
          <span class="storage-tab" data-stype="archive" data-i18n="st.archive">归档</span>
          <span class="storage-tab" data-stype="template" data-i18n="st.template">模板</span>
        </div>
        <div class="storage-list" id="storageList"></div>
      </div>
      <div class="chat-foot" id="chatFoot">
        <div class="pend-row" id="pendRow"></div>
        <div class="att-tray" id="attTray">
          <div class="tray-item" data-att="pick"><span class="fic">+</span><div><b data-i18n="room.pickFile">选择文件</b><span data-i18n="room.pickDesc">从设备选取</span></div></div>
        </div>
        <div class="input-row">
          <span class="plus" id="plusBtn" title="附件" data-i18n="room.attach">+</span>
          <input id="msgInput" data-i18n-ph="room.input" placeholder="设备指令或任何问题 · 如: 打开手电筒" autocomplete="off">
          <button class="send" id="btnSend" title="发送" data-i18n="room.send">↑</button>
        </div>
      </div>
      <button class="file-fab" id="fileFabAdd" style="display:none">＋</button>
      <!-- Fix 2: 文件预览 overlay -->
      <div class="preview-mask" id="previewMask" style="display:none"></div>
      <div class="preview-overlay" id="previewOverlay" style="display:none">
        <div class="preview-bar">
          <span class="preview-name" id="previewName"></span>
          <span class="sheet-close" id="previewClose">✕</span>
        </div>
        <div class="preview-body" id="previewBody"></div>
      </div>
      <!-- 版本历史 overlay -->
      <div class="preview-mask" id="versionMask" style="display:none"></div>
      <div class="preview-overlay" id="versionOverlay" style="display:none">
        <div class="preview-bar">
          <span class="preview-name" id="versionName"></span>
          <span class="sheet-close" id="versionClose">✕</span>
        </div>
        <div class="preview-body" id="versionBody"></div>
      </div>
      <!-- 新建模板 sheet -->
      <div class="sheet-mask" id="templateMask" style="z-index:13"></div>
      <div class="sheet" id="templateSheet" style="z-index:14">
        <div style="display:flex;align-items:center;justify-content:space-between"><h5 data-i18n="st.newTemplate">新建模板</h5><span class="sheet-close" id="btnTemplateClose">✕</span></div>
        <input id="templateName" data-i18n-ph="st.templateName" placeholder="模板名 · 如: PRD模板.md" style="width:100%;border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-family:var(--font-mono);font-size:12px;outline:none;background:var(--panel-2);margin:8px 0">
        <textarea id="templateContent" data-i18n-ph="st.templateContent" placeholder="模板内容" style="width:100%;height:120px;margin:0 0 8px;border:1px solid var(--line);border-radius:var(--r-md);padding:10px;font-family:var(--font-mono);font-size:12px;resize:vertical;outline:none;background:var(--panel-2)"></textarea>
        <button class="btn btn-acc" id="btnTemplateOk" style="width:100%;justify-content:center" data-i18n="st.templateSave">保存模板</button>
      </div>
      <!-- Fix 5: 新建文件 sheet -->
      <div class="sheet-mask" id="fileNewMask" style="z-index:11"></div>
      <div class="sheet" id="fileNewSheet" style="z-index:12">
        <div style="display:flex;align-items:center;justify-content:space-between"><h5 data-i18n="files.new">新建文件</h5><span class="sheet-close" id="btnFileNewClose">✕</span></div>
        <input id="fileNewName" data-i18n-ph="files.newName" placeholder="文件名 · 如: notes.md" style="width:100%;border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-family:var(--font-mono);font-size:12px;outline:none;background:var(--panel-2);margin:8px 0">
        <textarea id="fileNewContent" data-i18n-ph="files.newContent" placeholder="文件内容 (选填)" style="width:100%;height:120px;margin:0 0 8px;border:1px solid var(--line);border-radius:var(--r-md);padding:10px;font-family:var(--font-mono);font-size:12px;resize:vertical;outline:none;background:var(--panel-2)"></textarea>
        <button class="btn btn-acc" id="btnFileNewCreate" style="width:100%;justify-content:center" data-i18n="files.create">创建文件</button>
      </div>
    </div>



    <!-- 运行 tab (v3: 个人信息 + 精简 + 合并 Cron) -->
    <div class="view" id="view-run">
      <div class="abar"><div><h4 data-i18n="rt.title">运行</h4><div class="sub" id="runSub" data-i18n="rt.sub">原生能力引擎</div></div><span class="grow"></span><span class="ico-btn" id="btnRunRefresh">⟳</span></div>
      <!-- 个人信息 (DESIGN_OPTIMIZE §1) -->
      <div class="personal-row" id="personalRow">
        <span class="pr-avatar" id="prAvatar">●</span>
        <span class="pr-name" id="prName">本地用户</span>
        <span class="grow"></span>
        <span class="ico-btn" id="btnPersonalSettings" title="设置">≡</span>
      </div>
      <div class="sbody">
        <!-- 状态条: MOV 运行正常 · 已运行 Xh Xm -->
        <div class="status-strip" id="statusStrip">
          <span class="ss-dot" id="ssDot"></span>
          <span id="ssText">MOV 运行正常</span>
          <span class="ss-uptime" id="ssUptime">--</span>
          <span class="ss-dev" id="ssDevToggle">▸</span>
        </div>
        <!-- 开发者指标 (默认折叠, DESIGN_OPTIMIZE §1: 点到设置→关于可见) -->
        <div id="devMetrics" style="display:none">
          <div class="proc-card">
            <div class="proc-line">$ pid <b id="rtPid">--</b></div>
            <div class="proc-meters">
              <div class="m"><b id="rtMem">--<i> MB</i></b><span data-i18n="rt.mem">JVM 内存</span><div class="bar"><i id="rtMemBar" style="width:0%"></i></div></div>
              <div class="m"><b id="rtCmds">--<i data-i18n="rt.times">次</i></b><span data-i18n="rt.cmds">指令执行</span><div class="bar"><i id="rtCmdBar" style="width:0%"></i></div></div>
            </div>
            <div class="proc-line" style="margin-top:4px"><span data-i18n="rt.lastCmd">最近指令</span> <b id="rtLastCmdName">--</b> · <span class="val" id="rtLastCmd">--</span> ms</div>
          </div>
        </div>
        <!-- 三行入口: 点击进入详情 -->
        <div class="triple-row">
          <div class="t-row" id="rowChannels">
            <span class="t-label" data-i18n="rt.channels">通道</span>
            <span class="t-val" id="chanSummary">--</span>
            <span class="t-arrow">›</span>
          </div>
          <div class="t-row" id="rowSkills">
            <span class="t-label" data-i18n="skill.title">技能</span>
            <span class="t-val" id="skillSummary">--</span>
            <span class="t-arrow">›</span>
          </div>
          <div class="t-row" id="rowPerms">
            <span class="t-label" data-i18n="rt.perms2">权限</span>
            <span class="t-val" id="permSummary">--</span>
            <span class="t-arrow">›</span>
          </div>
        </div>

        <!-- 详情弹层 (通道/权限/技能共用) -->
        <div class="preview-mask" id="runDetailMask" style="display:none"></div>
        <div class="preview-overlay" id="runDetailOverlay" style="display:none">
          <div class="preview-bar">
            <span class="preview-name" id="runDetailTitle"></span>
            <span class="sheet-close" id="runDetailClose">✕</span>
          </div>
          <div class="preview-body" id="runDetailBody"></div>
        </div>

        <!-- MODEL -->
        <div class="sub-head" data-i18n="rt.model">模型</div>
        <div id="modelList"></div>

        <!-- CRON -->
        <div class="sub-head"><span data-i18n="rt.cron">定时任务</span> · <span id="cronSub">0</span></div>
        <div class="auto-input"><input class="field" id="cronInput" data-i18n-ph="rt.cronInput" placeholder="自然语言创建任务 · 如: 每天 8:30 汇总邮箱" aria-label="创建任务"><button class="go" id="btnCronCreate" data-i18n="rt.cronCreate">创建</button></div>
        <div id="cronJobList"></div>
      </div>
    </div>

    <!-- 新建房间: 居中弹窗 -->
    <div class="dialog-mask" id="newRoomMask">
      <div class="dialog" id="newRoomDialog">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h5>新建房间</h5><span class="sheet-close" id="btnSheetClose">✕</span></div>
        <input id="newRoomName" placeholder="项目名 · 如: 产品V2.0" style="width:100%;border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-family:var(--font-mono);font-size:12px;outline:none;background:var(--panel-2);margin-bottom:10px">
        <button class="btn btn-acc" id="btnCreate" style="width:100%;justify-content:center">创建</button>
      </div>
    </div>

    <!-- 房间操作 sheet -->
    <div class="sheet-mask" id="roomOpsMask"></div>
    <div class="sheet" id="sheetRoomOps">
      <div style="display:flex;align-items:center;justify-content:space-between"><h5 data-i18n="ops.title">房间操作</h5><span class="sheet-close" id="btnRoomOpsClose">✕</span></div>
      <div class="sh-sub" id="roomOpsName">—</div>
      <div id="roomOpsMenu">
        <div class="sheet-row" id="opsRename" data-i18n="ops.rename">重命名</div>
        <div class="sheet-row" id="opsArchive" data-i18n="ops.archive">归档</div>
        <div class="sheet-row" id="opsClear" data-i18n="ops.clear">清空聊天记录</div>
        <div class="sheet-row danger" id="opsDelete" data-i18n="ops.delete">删除房间</div>
      </div>
      <div id="roomOpsConfirm" style="display:none">
        <p id="roomOpsConfirmText" style="font-size:12px;color:var(--ink-2);line-height:1.6;margin-bottom:12px"></p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" id="opsConfirmCancel" style="flex:1;justify-content:center" data-i18n="ops.cancel">取消</button>
          <button class="btn btn-acc" id="opsConfirmOk" style="flex:1;justify-content:center" data-i18n="ops.confirm">确认</button>
        </div>
      </div>
      <div id="roomOpsRename" style="display:none">
        <input id="opsRenameInput" style="width:100%;border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-family:var(--font-mono);font-size:12px;outline:none;background:var(--panel-2);margin-bottom:12px">
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" id="opsRenameCancel" style="flex:1;justify-content:center" data-i18n="ops.cancel">取消</button>
          <button class="btn btn-acc" id="opsRenameOk" style="flex:1;justify-content:center" data-i18n="ops.confirm">确认</button>
        </div>
      </div>
    </div>

    <!-- 消息/技能长按操作条 -->
    <div class="msg-actions" id="msgActions">
      <span id="msgActionText"></span>
    </div>

  </div>
  <div class="bnav">
    <button data-tab="chat" class="on"><span class="ic">▤<i class="nd" id="ndChat"></i></span><span data-i18n="nav.chat">会话</span></button>
    <button data-tab="run"><span class="ic">▣</span><span data-i18n="nav.runtime">运行</span></button>
  </div>
</div>

<!-- JS: 严格按依赖顺序加载 -->
<script src="js/i18n.js"></script>
<script src="js/store.js"></script>
<script src="js/bridge.js"></script>
<script src="js/render.js"></script>
<script src="js/chat.js"></script>
<script src="js/skills.js"></script>
<script src="js/files.js"></script>
<script src="js/runtime.js"></script>
<script src="js/app-chat.js"></script>
<script src="js/app-room.js"></script>
<script src="js/app-files.js"></script>
<script src="js/app-run.js"></script>
<script src="js/app.js"></script>
</body>
</html>
